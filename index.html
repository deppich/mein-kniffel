<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kniffel Online Deluxe</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #27ae60;
            --secondary: #e67e22;
            --accent: #3498db;
            --danger: #e74c3c;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Header & Status */
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        #status-info {
            background: #2c3e50;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #3e5871;
        }

        .online-tag {
            color: #2ecc71;
            font-size: 0.8rem;
            font-weight: bold;
        }

        #lobby {
            font-size: 0.9rem;
            color: #aaa;
        }

        #player-list {
            color: var(--accent);
            font-weight: bold;
        }

        /* Haupt-Layout */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Spiel-Bereich */
        .game-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex: 1;
            min-width: 320px;
            max-width: 500px;
        }

        .dice-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }

        .die {
            width: 55px;
            height: 55px;
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2);
        }

        .die:hover {
            transform: scale(1.05);
        }

        .keep {
            background: var(--gold) !important;
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(241, 196, 15, 0.4);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #roll-btn {
            background: var(--primary);
            color: white;
            font-size: 20px;
        }

        #roll-btn:hover:not(:disabled) {
            background: #2ecc71;
            transform: translateY(-2px);
        }

        #end-turn-btn {
            background: var(--secondary);
            color: white;
        }

        #end-turn-btn:hover:not(:disabled) {
            background: #d35400;
        }

        button:disabled {
            background: #333 !important;
            color: #777;
            cursor: not-allowed;
        }

        /* Scoreboard */
        .score-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex: 1.5;
            min-width: 350px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        td {
            background: white;
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .cat-name {
            text-align: left;
            font-weight: bold;
            background: #f8f9fa;
        }

        .my-score-cell {
            font-weight: bold;
            color: var(--primary);
        }

        /* Footer Controls */
        .footer-actions {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .danger-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 12px;
        }

        .danger-btn:hover {
            background: var(--danger);
            color: white;
        }

        .info-text {
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="header-section">
        <h1>KNIFFEL <span style="color:var(--primary)">LIVE</span> 🎲</h1>
        <div id="status-info">
            <span id="status-text">Initialisiere...</span>
            <span id="online-status" class="online-tag"></span>
        </div>
        <div id="lobby">
            Online: <span id="player-list">-</span>
        </div>
    </div>

    <div class="main-container">
        <div class="game-card">
            <div class="info-text">Angemeldet als: <b id="my-display-name" style="color:var(--accent)">...</b></div>

            <div class="dice-area">
                <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
                <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
                <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
                <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
                <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
            </div>

            <div class="btn-group">
                <button id="roll-btn" onclick="sendRoll()">WÜRFELN (3)</button>
                <button id="end-turn-btn" onclick="endTurn()" disabled>ZUG BEENDEN</button>
            </div>
        </div>

        <div class="score-card">
            <table id="multi-score-table">
                <thead id="score-head">
                    <tr>
                        <th>Kategorie</th>
                    </tr>
                </thead>
                <tbody id="score-body"></tbody>
                <tfoot id="score-foot">
                    <tr style="font-weight: bold;">
                        <td class="cat-name">GESAMT</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="footer-actions">
        <button onclick="changeName()" style="background:var(--accent); font-size:12px;">Name ändern</button>
        <button class="danger-btn" onclick="fullGameReset()">SPIEL FÜR ALLE LÖSCHEN</button>
    </div>

    <script>
        // --- DEINE FIREBASE KONFIGURATION HIER EINSETZEN ---
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041",
            measurementId: "G-3N5Q2QB2DQ"
        };
        // --------------------------------------------------


        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('kniffel_name') || prompt("Dein Name:") || "Gast";
        localStorage.setItem('kniffel_name', myName);
        document.getElementById('my-display-name').innerText = myName;

        let gameState = { activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 };

        const categories = [
            { id: '1', n: '1er' }, { id: '2', n: '2er' }, { id: '3', n: '3er' },
            { id: '4', n: '4er' }, { id: '5', n: '5er' }, { id: '6', n: '6er' },
            { id: 'fh', n: 'Full House' }, { id: 'ks', n: 'Kl. Straße' },
            { id: 'gs', n: 'Gr. Straße' }, { id: 'kn', n: 'Kniffel' }, { id: 'ch', n: 'Chance' }
        ];

        // Sync Spielstatus
        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                db.ref('game').set({ activePlayer: myName, dice: [1, 2, 3, 4, 5], keeps: [false, false, false, false, false], rollsLeft: 3 });
                return;
            }
            gameState = data;
            updateUI();
        });

        // Sync Presence & Scores
        db.ref('presence').on('value', (presenceSnap) => {
            const onlinePlayers = presenceSnap.val() ? Object.keys(presenceSnap.val()) : [myName];
            document.getElementById('player-list').innerText = onlinePlayers.join(', ');

            db.ref('scores').on('value', (scoreSnap) => {
                const allScores = scoreSnap.val() || {};
                onlinePlayers.forEach(p => { if (!allScores[p]) allScores[p] = {}; });
                renderGlobalTable(allScores, onlinePlayers);
            });
        });

        function updateUI() {
            const rollBtn = document.getElementById('roll-btn');
            const endBtn = document.getElementById('end-turn-btn');
            const status = document.getElementById('status-text');

            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`die-${i}`);
                el.innerText = gameState.dice[i];
                el.className = gameState.keeps[i] ? "die keep" : "die";
            }

            const isMyTurn = (gameState.activePlayer === "" || gameState.activePlayer === myName);
            if (isMyTurn) {
                status.innerText = "DU BIST DRAN";
                status.parentElement.style.background = "#27ae60";
                rollBtn.disabled = gameState.rollsLeft <= 0;
                rollBtn.innerText = `WÜRFELN (${gameState.rollsLeft})`;
                endBtn.disabled = gameState.rollsLeft === 3;
            } else {
                status.innerText = gameState.activePlayer.toUpperCase() + " WÜRFELT...";
                status.parentElement.style.background = "#34495e";
                rollBtn.disabled = true;
                endBtn.disabled = true;
            }
        }

        function renderGlobalTable(allScores, onlinePlayers) {
            const playerNames = [...new Set([...onlinePlayers, ...Object.keys(allScores)])].sort();

            // Header
            const headRow = document.querySelector('#score-head tr');
            headRow.innerHTML = '<th>Kategorie</th>';
            playerNames.forEach(p => {
                headRow.innerHTML += `<th style="${p === myName ? 'background:#27ae60' : ''}">${p}</th>`;
            });

            // Body
            const body = document.getElementById('score-body');
            body.innerHTML = '';
            categories.forEach(cat => {
                let row = `<tr><td class="cat-name">${cat.n}</td>`;
                playerNames.forEach(p => {
                    const val = (allScores[p] && allScores[p][cat.id] !== undefined) ? allScores[p][cat.id] : "-";
                    const isMe = (p === myName);
                    const clickable = isMe && val === "-" ? `onclick="claimScore('${cat.id}')" style="cursor:pointer; background:#fff"` : "";
                    const style = val !== "-" ? "background:#d1f2eb; font-weight:bold" : "";
                    row += `<td ${clickable} style="${style}">${val}</td>`;
                });
                body.innerHTML += row + `</tr>`;
            });

            // Footer
            const footRow = document.querySelector('#score-foot tr');
            footRow.innerHTML = '<td class="cat-name">GESAMT</td>';
            playerNames.forEach(p => {
                const total = Object.values(allScores[p] || {}).reduce((a, b) => a + b, 0);
                footRow.innerHTML += `<td style="background:#eee">${total}</td>`;
            });
        }

        function sendRoll() {
            if (gameState.rollsLeft <= 0) return;
            const newDice = [...gameState.dice];
            for (let i = 0; i < 5; i++) if (!gameState.keeps[i]) newDice[i] = Math.floor(Math.random() * 6) + 1;
            db.ref('game').update({ activePlayer: myName, dice: newDice, rollsLeft: gameState.rollsLeft - 1 });
        }

        function toggleKeep(i) {
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            if (gameState.rollsLeft === 3) return;
            const nk = [...gameState.keeps]; nk[i] = !nk[i];
            db.ref('game').update({ keeps: nk, activePlayer: myName });
        }

        function claimScore(catId) {
            if (gameState.activePlayer !== myName || gameState.rollsLeft === 3) return;
            db.ref('scores/' + myName + '/' + catId).set(calculatePoints(catId)).then(() => endTurn());
        }

        function calculatePoints(id) {
            const d = [...gameState.dice].sort();
            const sum = d.reduce((a, b) => a + b, 0);
            const counts = {}; d.forEach(x => counts[x] = (counts[x] || 0) + 1);
            const v = Object.values(counts);
            if (!isNaN(id)) return d.filter(x => x == id).length * parseInt(id);
            if (id === 'kn') return v.includes(5) ? 50 : 0;
            if (id === 'ch') return sum;
            if (id === 'fh') return (v.includes(3) && v.includes(2)) ? 25 : 0;
            const u = [...new Set(d)].join('');
            if (id === 'ks') return /1234|2345|3456/.test(u) ? 30 : 0;
            if (id === 'gs') return /12345|23456/.test(u) ? 40 : 0;
            return 0;
        }

        function endTurn() {
            db.ref('game').set({ activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 });
        }

        function fullGameReset() {
            if (confirm("Alles löschen?")) {
                db.ref('scores').remove();
                endTurn();
            }
        }

        function changeName() { localStorage.removeItem('kniffel_name'); location.reload(); }
        function updatePresence() {
            const r = db.ref('presence/' + myName);
            r.set(true); r.onDisconnect().remove();
        }

        updatePresence();
    </script>
</body>

</html>
