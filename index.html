<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kniffel Online - Room Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #27ae60;
            --secondary: #e67e22;
            --accent: #3498db;
            --danger: #e74c3c;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        #status-info {
            background: #2c3e50;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px;
            border: 1px solid #3e5871;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .game-card,
        .score-card,
        .chat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-card {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
        }

        .score-card {
            flex: 1.5;
            min-width: 350px;
        }

        .chat-card {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .dice-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .die {
            width: 55px;
            height: 55px;
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid transparent;
        }

        .keep {
            background: var(--gold) !important;
            transform: translateY(-5px);
            border-color: #d4ac0d;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: #333;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
            font-size: 0.85rem;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
        }

        .cat-name {
            text-align: left;
            font-weight: bold;
            background: #f8f9fa;
            width: 140px;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-align: left;
        }

        .msg {
            margin-bottom: 5px;
            color: #ccc;
        }

        .msg b {
            color: var(--accent);
        }

        #chat-input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: calc(100% - 24px);
            background: #333;
            color: white;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 8px;
        }

        #roll-btn {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
        }

        #roll-btn:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }

        .danger-btn {
            background: var(--danger);
            color: white;
            width: auto;
            padding: 10px 20px;
            margin-top: 30px;
        }

        /* Sieg Overlay */
        #victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        @keyframes roll {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(10deg) scale(1.1);
            }

            50% {
                transform: rotate(-10deg) scale(1.1);
            }

            75% {
                transform: rotate(5deg) scale(1.1);
            }

            100% {
                transform: rotate(0deg) scale(1);
            }
        }

        .rolling {
            animation: roll 0.4s ease-in-out;
            background: #eee !important;
            color: transparent !important;
            /* Versteckt die Zahl während des Rollens */
        }

        .die {
            width: 65px;
            /* Etwas größer für die Augen */
            height: 65px;
            background: white;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            /* WICHTIG: Schriftgröße hochschrauben! */
            font-size: 60px;
            line-height: 1;
            font-family: "Segoe UI Symbol", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            border: 3px solid #ccc;
            user-select: none;
            /* Verhindert Markieren beim Klicken */
        }

        .die.keep {
            background: #f1c40f !important;
            border-color: #d4ac0d;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>

<body>

    <div class="header-section">
        <h1>KNIFFEL <span id="room-display" style="color:var(--accent)">...</span></h1>
        <div id="status-info">
            <span id="status-text">Lade Spiel...</span>
        </div>
        <p style="font-size: 0.8rem; color: #888;">Im Raum: <span id="player-list" style="color:var(--accent)">-</span>
        </p>
    </div>

    <div class="main-container">
        <div id="lobby-section"
            style="background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 2px solid var(--accent);">
            <h3>Wartezimmer</h3>
            <p id="lobby-status">Warte auf Mitspieler...</p>
            <div id="lobby-players" style="margin: 10px 0; color: var(--gold);"></div>
            <button id="start-game-btn" onclick="startGame()" style="background: var(--primary); display: none;">SPIEL
                JETZT STARTEN</button>
        </div>
        <div class="game-card">
            <div style="font-size: 0.9rem; margin-bottom: 15px;">Spieler: <b id="my-display-name">...</b></div>
            <div class="dice-area">
                <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
                <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
                <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
                <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
                <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
            </div>
            <button id="roll-btn" onclick="sendRoll()">WÜRFELN (3)</button>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="changeName()" style="background:#555; color:white; font-size:0.7rem;">Name
                    ändern</button>
                <button onclick="location.hash=''; location.reload();"
                    style="background:var(--secondary); color:white; font-size:0.7rem;">Raum wechseln</button>
            </div>
        </div>

        <div class="score-card">
            <table id="multi-score-table">
                <thead id="score-head">
                    <tr>
                        <th>Kategorie</th>
                    </tr>
                </thead>
                <tbody id="score-body"></tbody>
                <tfoot id="score-foot">
                    <tr style="font-weight: bold;">
                        <td class="cat-name">GESAMT</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="chat-card">
            <h3 style="margin:0 0 10px 0; font-size: 1rem; color: var(--accent);">Raum-Chat</h3>
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Nachricht..."
                onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <div style="text-align: center;">
        <button class="danger-btn" onclick="fullGameReset()">DIESEN RAUM ZURÜCKSETZEN</button>
    </div>

    <script>
        // --- KONFIGURATION & RÄUME ---
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomId = window.location.hash.substring(1) || prompt("Raum Name?", "Lobby") || "Lobby";
        window.location.hash = roomId;
        document.getElementById('room-display').innerText = "#" + roomId;

        let myName = localStorage.getItem('kniffel_name') || prompt("Dein Name:") || "Gast";
        localStorage.setItem('kniffel_name', myName);
        document.getElementById('my-display-name').innerText = myName;

        let gameState = { activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 };
        const categories = [
            { id: '1', n: '1er' }, { id: '2', n: '2er' }, { id: '3', n: '3er' },
            { id: '4', n: '4er' }, { id: '5', n: '5er' }, { id: '6', n: '6er' },
            { id: 'bonus', n: 'BONUS (ab 63)', isStatic: true },
            { id: '3p', n: '3er Pasch' }, // NEU
            { id: '4p', n: '4er Pasch' }, // NEU
            { id: 'fh', n: 'Full House' }, { id: 'ks', n: 'Kl. Straße' },
            { id: 'gs', n: 'Gr. Straße' }, { id: 'kn', n: 'KNIFFEL' }, { id: 'ch', n: 'Chance' }
        ];

        // --- DATABASE REFS (Room-Scoped) ---
        const roomRef = db.ref('rooms/' + roomId);
        const gameRef = roomRef.child('game');
        const scoreRef = roomRef.child('scores');
        const chatRef = roomRef.child('chat');
        const presenceRef = roomRef.child('presence');

        // --- GAME LOGIC & INITIALISIERUNG ---

        // Diese Funktion wird aufgerufen, sobald die Seite lädt
        function initGame() {
            // 1. Listener für Spieler-Anwesenheit & Host-Logik
            presenceRef.on('value', snap => {
                const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];
                isHost = (players[0] === myName);

                // 2. Listener für den globalen Spielstatus (Zentraler Punkt für alle Updates)
                roomRef.on('value', roomSnap => {
                    const data = roomSnap.val();
                    if (data) {
                        // Daten synchronisieren
                        if (data.game) gameState = data.game;
                        // Falls gameStarted in roomRef direkt liegt:
                        gameState.gameStarted = data.gameStarted || false;

                        // UI mit aktuellen Spielern zeichnen
                        renderUI(players);

                        // Score Tabelle rendern
                        renderGlobalTable(data.scores || {}, players);
                    }
                });
            });

            // Chat-Listener separat
            initChatListener();
        }

        // --- UI RENDERING (Die reine Anzeige) ---
        function renderUI(players) {
            // Würfel-Optik aktualisieren
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`die-${i}`);
                if (el) {
                    // Wenn Würfelwert 0 ist (vor dem ersten Wurf), zeige '?'
                    el.innerHTML = gameState.dice[i] === 0 ? '?' : getDiceIcon(gameState.dice[i]);
                    el.className = gameState.keeps[i] ? "die keep" : "die";
                }
            }

            const lobby = document.getElementById('lobby-section');
            const gameCard = document.querySelector('.game-card');
            const scoreCard = document.querySelector('.score-card');
            const startBtn = document.getElementById('start-game-btn');
            const statusText = document.getElementById('status-text');
            const rollBtn = document.getElementById('roll-btn');

            if (!gameState.gameStarted) {
                // LOBBY MODUS
                lobby.style.display = "block";
                gameCard.style.opacity = "0.3";
                gameCard.style.pointerEvents = "none";
                scoreCard.style.opacity = "0.3";

                document.getElementById('lobby-players').innerText = "Bereit: " + players.join(", ");

                if (isHost) {
                    startBtn.style.display = "block";
                    document.getElementById('lobby-status').innerText = "Du bist der Host. Warte auf alle Spieler...";
                } else {
                    startBtn.style.display = "none";
                    document.getElementById('lobby-status').innerText = `Warte darauf, dass ${players[0]} startet...`;
                }
            } else {
                // SPIEL MODUS
                lobby.style.display = "none";
                gameCard.style.opacity = "1";
                gameCard.style.pointerEvents = "auto";
                scoreCard.style.opacity = "1";

                const currentPlayer = gameState.activePlayer || players[0];
                const isMyTurn = (currentPlayer === myName);

                statusText.innerText = isMyTurn ? "DU BIST DRAN!" : `${currentPlayer} IST DRAN`;

                rollBtn.disabled = !isMyTurn || gameState.rollsLeft <= 0;
                rollBtn.innerText = isMyTurn ? `WÜRFELN (${gameState.rollsLeft})` : "Warten...";
            }

            // Spielerliste oben im Header
            document.getElementById('player-list').innerText = players.join(', ');
        }

        function startGame() {
            if (!isHost) return;

            presenceRef.once('value', snap => {
                const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];

                // WICHTIG: Alles in einem Rutsch setzen
                roomRef.update({
                    gameStarted: true,
                    game: {
                        activePlayer: players[0],
                        rollsLeft: 3,
                        dice: [0, 0, 0, 0, 0],
                        keeps: [false, false, false, false, false]
                    }
                });
            });
        }

        // Hilfsfunktion für die Würfel-Icons
        function getDiceIcon(num) {
            const icons = { 1: '⚀', 2: '⚁', 3: '⚂', 4: '⚃', 5: '⚄', 6: '⚅' };
            return icons[num] || '?';
        }

        // --- AKTIONEN (Würfeln, Click etc.) ---
        function sendRoll() {
            if (gameState.rollsLeft <= 0) return;

            // Animation
            for (let i = 0; i < 5; i++) {
                if (!gameState.keeps[i]) document.getElementById(`die-${i}`).classList.add('rolling');
            }

            setTimeout(() => {
                const newDice = [...gameState.dice];
                for (let i = 0; i < 5; i++) {
                    if (!gameState.keeps[i]) newDice[i] = Math.floor(Math.random() * 6) + 1;
                }

                gameRef.update({
                    activePlayer: myName,
                    dice: newDice,
                    rollsLeft: gameState.rollsLeft - 1
                }).then(() => {
                    for (let i = 0; i < 5; i++) {
                        document.getElementById(`die-${i}`).classList.remove('rolling');
                    }
                });
            }, 400);
        }

        function toggleKeep(i) {
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            const nk = [...gameState.keeps];
            nk[i] = !nk[i];
            gameRef.update({ keeps: nk, activePlayer: myName });
        }

        function claimScore(id) {
            if (categories.find(c => c.id === id)?.isStatic) return;
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            if (gameState.rollsLeft === 3) return; // Noch nicht gewürfelt

            const val = calculatePoints(id);
            const catName = categories.find(c => c.id === id).n;

            scoreRef.child(myName).child(id).set(val).then(() => {
                chatRef.push({
                    name: "📢 LOG",
                    text: `${myName} hat ${val} Punkte bei ${catName} erzielt!`,
                });

                presenceRef.once('value', snap => {
                    const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];
                    const nextPlayer = getNextPlayer(myName, players);
                    gameRef.set({
                        activePlayer: nextPlayer,
                        dice: [0, 0, 0, 0, 0],
                        keeps: [false, false, false, false, false],
                        rollsLeft: 3
                    });
                });
            });
        }

        // --- HILFSFUNKTIONEN (Tabellen, Chat etc.) ---
        function renderGlobalTable(allScores, players) {
            const pNames = players;
            const head = document.querySelector('#score-head tr');
            head.innerHTML = '<th>Kategorie</th>';
            pNames.forEach(p => head.innerHTML += `<th style="${p === myName ? 'background:var(--primary)' : ''}">${p}</th>`);

            const body = document.getElementById('score-body');
            body.innerHTML = '';
            categories.forEach(cat => {
                let row = `<tr><td class="cat-name">${cat.n}</td>`;
                pNames.forEach(p => {
                    let val = "-"; let style = ""; let action = "";
                    if (cat.id === 'bonus') {
                        const sum = ['1', '2', '3', '4', '5', '6'].reduce((s, i) => s + (allScores[p]?.[i] || 0), 0);
                        val = sum >= 63 ? 35 : `(${sum}/63)`;
                        style = sum >= 63 ? "background:#f1c40f; font-weight:bold;" : "background:#eee; color:#999; font-size:0.7rem;";
                    } else {
                        const s = allScores[p]?.[cat.id];
                        val = (s !== undefined) ? s : "-";
                        if (p === myName && val === "-") action = `onclick="claimScore('${cat.id}')" style="cursor:pointer; background:#fff"`;
                        if (val !== "-") style = "background:#d1f2eb; font-weight:bold";
                    }
                    row += `<td ${action} style="${style}">${val}</td>`;
                });
                body.innerHTML += row + `</tr>`;
            });
            // Fusszeile (Gesamt) hier ergänzen...
        }

        function initChatListener() {
            chatRef.limitToLast(20).on('child_added', snap => {
                const m = snap.val();
                const d = document.getElementById('chat-messages');
                const isLog = m.name === "📢 LOG";
                const style = isLog ? "font-style: italic; color: #888; font-size: 0.8rem; border-left: 2px solid var(--primary); padding-left: 5px;" : "";
                d.innerHTML += `<div class="msg" style="${style}"><b>${m.name}:</b> ${m.text}</div>`;
                d.scrollTop = d.scrollHeight;
            });
        }

        function sendMessage() {
            const i = document.getElementById('chat-input');
            if (!i.value) return;
            chatRef.push({ name: myName, text: i.value });
            i.value = "";
        }

        // Restliche Hilfsfunktionen (getNextPlayer, calculatePoints, Reset etc.)
        function getNextPlayer(currentName, allPlayers) {
            const currentIndex = allPlayers.indexOf(currentName);
            const nextIndex = (currentIndex + 1) % allPlayers.length;
            return allPlayers[nextIndex];
        }

        function calculatePoints(id) {
            const d = [...gameState.dice].sort();
            const sum = d.reduce((a, b) => a + b, 0);
            const counts = {}; d.forEach(x => counts[x] = (counts[x] || 0) + 1);
            const v = Object.values(counts);
            if (d.includes(0)) return 0;
            if (!isNaN(id)) return d.filter(x => x == id).length * parseInt(id);
            if (id === '3p') return v.some(count => count >= 3) ? sum : 0;
            if (id === '4p') return v.some(count => count >= 4) ? sum : 0;
            if (id === 'kn') return v.includes(5) ? 50 : 0;
            if (id === 'ch') return sum;
            if (id === 'fh') return (v.includes(3) && v.includes(2)) ? 25 : 0;
            const u = [...new Set(d)].join('');
            if (id === 'ks') return /1234|2345|3456/.test(u) ? 30 : 0;
            if (id === 'gs') return /12345|23456/.test(u) ? 40 : 0;
            return 0;
        }

        function fullGameReset() {
            if (confirm("Raum wirklich komplett zurücksetzen?")) {
                roomRef.remove().then(() => location.reload());
            }
        }

        function changeName() { localStorage.removeItem('kniffel_name'); location.reload(); }

        // Startschuss
        const r = presenceRef.child(myName);
        r.set(true);
        r.onDisconnect().remove();
        initGame();
    </script>
</body>

</html>
