<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Kniffel Echtzeit-Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* (Hier bleibt dein cooles 3D-CSS von oben erhalten) */
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            text-align: center;
        }

        .dice-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            perspective: 1000px;
            margin: 20px;
        }

        .die {
            width: 60px;
            height: 60px;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .keep {
            background: #f1c40f !important;
            transform: scale(1.1);
        }

        #status-info {
            background: #27ae60;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Kniffel Online 🌐</h1>
    <div id="status-info">Verbindung wird hergestellt...</div>

    <div class="dice-area" id="dice-container">
        <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
        <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
        <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
        <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
        <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
    </div>

    <button id="roll-btn" onclick="sendRoll()" disabled>Würfeln</button>
    <p>Du spielst als: <b id="my-name">...</b></p>

    <script>
        // --- DEINE FIREBASE KONFIGURATION HIER EINSETZEN ---
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041",
            measurementId: "G-3N5Q2QB2DQ"
        };
        // --------------------------------------------------

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = prompt("Wie heißt du?") || "Gast_" + Math.floor(Math.random() * 100);
        document.getElementById('my-name').innerText = myName;

        let gameState = {
            activePlayer: "",
            dice: [1, 1, 1, 1, 1],
            keeps: [false, false, false, false, false],
            rollsLeft: 3
        };

        // ECHTZEIT-UPDATE: Wenn sich in der Datenbank was ändert
        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();

            // FALLS DIE DATENBANK LEER IST: Initialisiere sie mit Startwerten
            if (!data) {
                db.ref('game').set({
                    activePlayer: "",
                    dice: [1, 1, 1, 1, 1],
                    keeps: [false, false, false, false, false],
                    rollsLeft: 3
                });
                return; // Funktion beenden, da das Setzen ein neues Update auslöst
            }

            // Daten in unseren lokalen Speicher laden
            gameState = data;
            updateUI();
        });

        function updateUI() {
            const info = document.getElementById('status-info');
            const btn = document.getElementById('roll-btn');

            // Sicherheitscheck: Nur zeichnen, wenn dice wirklich ein Array ist
            if (gameState && gameState.dice) {
                for (let i = 0; i < 5; i++) {
                    const dieEl = document.getElementById(`die-${i}`);
                    if (dieEl) {
                        dieEl.innerText = gameState.dice[i];
                        dieEl.className = gameState.keeps[i] ? "die keep" : "die";
                    }
                }
            }

            // Würfel anzeigen
            for (let i = 0; i < 5; i++) {
                const dieEl = document.getElementById(`die-${i}`);
                dieEl.innerText = gameState.dice[i];
                dieEl.className = gameState.keeps[i] ? "die keep" : "die";
            }

            // Wer ist dran?
            if (gameState.activePlayer === "" || gameState.activePlayer === myName) {
                info.innerText = "Du bist dran!";
                btn.disabled = gameState.rollsLeft <= 0;
            } else {
                info.innerText = gameState.activePlayer + " würfelt gerade...";
                btn.disabled = true;
            }
        }

        function sendRoll() {
            // Berechne neue Würfel lokal
            const newDice = [...gameState.dice];
            for (let i = 0; i < 5; i++) {
                if (!gameState.keeps[i]) newDice[i] = Math.floor(Math.random() * 6) + 1;
            }

            // Sende an alle (Firebase)
            db.ref('game').update({
                activePlayer: myName,
                dice: newDice,
                rollsLeft: gameState.rollsLeft - 1
            });
        }

        function toggleKeep(i) {
            if (gameState.activePlayer !== myName && gameState.activePlayer !== "") return;

            const newKeeps = [...gameState.keeps];
            newKeeps[i] = !newKeeps[i];

            db.ref('game').update({
                keeps: newKeeps,
                activePlayer: myName
            });
        }
    </script>
</body>

</html>
