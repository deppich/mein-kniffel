<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kniffel Online Deluxe + Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #27ae60;
            --secondary: #e67e22;
            --accent: #3498db;
            --danger: #e74c3c;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        #status-info {
            background: #2c3e50;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px;
            border: 1px solid #3e5871;
        }

        .online-tag {
            color: #2ecc71;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Game & Score Cards */
        .game-card,
        .score-card,
        .chat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-card {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
        }

        .score-card {
            flex: 1.5;
            min-width: 350px;
        }

        .chat-card {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            height: 450px;
        }

        /* Dice */
        .dice-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .die {
            width: 50px;
            height: 50px;
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .keep {
            background: var(--gold) !important;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: #333;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 8px;
            font-size: 0.8rem;
        }

        td {
            padding: 8px;
            border: 1px solid #eee;
            text-align: center;
        }

        .cat-name {
            text-align: left;
            font-weight: bold;
            background: #f8f9fa;
        }

        /* Chat */
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-align: left;
        }

        .msg {
            margin-bottom: 5px;
        }

        .msg b {
            color: var(--accent);
        }

        #chat-input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: calc(100% - 20px);
        }

        /* Buttons */
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 5px;
        }

        #roll-btn {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
        }

        #end-turn-btn {
            background: var(--secondary);
            color: white;
        }

        button:disabled {
            background: #333 !important;
            color: #777;
            cursor: not-allowed;
        }

        .danger-btn {
            background: var(--danger);
            color: white;
            margin-top: 20px;
            width: auto;
        }
    </style>
</head>

<body>

    <div class="header-section">
        <h1>KNIFFEL <span style="color:var(--primary)">LIVE</span> 🎲</h1>
        <div id="status-info">
            <span id="status-text">Lade Spiel...</span>
            <span id="online-status" class="online-tag"></span>
        </div>
        <p style="font-size: 0.8rem; color: #888;">Online: <span id="player-list" style="color:var(--accent)">-</span>
        </p>
    </div>

    <div class="main-container">
        <div class="game-card">
            <div style="font-size: 0.9rem; margin-bottom: 10px;">Ich bin: <b id="my-display-name">...</b></div>
            <div class="dice-area">
                <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
                <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
                <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
                <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
                <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
            </div>
            <button id="roll-btn" onclick="sendRoll()">WÜRFELN (3)</button>
            <button onclick="changeName()"
                style="background:var(--accent); color:white; margin-top:15px; font-size: 0.7rem;">Name ändern</button>
        </div>

        <div class="score-card">
            <table id="multi-score-table">
                <thead id="score-head">
                    <tr>
                        <th>Kategorie</th>
                    </tr>
                </thead>
                <tbody id="score-body"></tbody>
                <tfoot id="score-foot">
                    <tr style="font-weight: bold;">
                        <td class="cat-name">GESAMT</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="chat-card">
            <h3 style="margin:0 0 10px 0; font-size: 1rem; color: var(--accent);">Live Chat</h3>
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Nachricht schreiben..."
                onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <div style="text-align: center;">
        <button class="danger-btn" onclick="fullGameReset()">SPIEL FÜR ALLE LÖSCHEN</button>
    </div>

    <script>
        // FIREBASE CONFIG (Deine Daten sind hier bereits drin)
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('kniffel_name') || prompt("Dein Name:") || "Gast";
        localStorage.setItem('kniffel_name', myName);
        document.getElementById('my-display-name').innerText = myName;

        let gameState = { activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 };
        const categories = [
            { id: '1', n: '1er' }, { id: '2', n: '2er' }, { id: '3', n: '3er' },
            { id: '4', n: '4er' }, { id: '5', n: '5er' }, { id: '6', n: '6er' },
            { id: 'bonus', n: 'BONUS (ab 63 Pkt.)', isStatic: true }, // Neues Bonus-Feld
            { id: 'fh', n: 'Full House' }, { id: 'ks', n: 'Kl. Straße' },
            { id: 'gs', n: 'Gr. Straße' }, { id: 'kn', n: 'KNIFFEL' }, { id: 'ch', n: 'Chance' }
        ];

        // --- GAME SYNC ---
        db.ref('game').on('value', snap => {
            const data = snap.val();

            // FALLS DIE DATENBANK LEER IST (Initialisierung)
            if (!data) {
                console.log("Datenbank leer, erstelle Startwerte...");
                db.ref('game').set({
                    activePlayer: "",
                    dice: [1, 2, 3, 4, 5],
                    keeps: [false, false, false, false, false],
                    rollsLeft: 3
                });
                return; // Funktion hier stoppen, da der nächste 'value' Aufruf gleich kommt
            }

            // DATEN ÜBERNEHMEN
            gameState = data;

            // WICHTIG: Falls dice aus irgendeinem Grund fehlt, Standardwerte setzen
            if (!gameState.dice) gameState.dice = [1, 2, 3, 4, 5];

            updateUI();
        });

        // --- SCORES & PRESENCE ---
        db.ref('presence').on('value', pSnap => {
            const players = pSnap.val() ? Object.keys(pSnap.val()) : [myName];
            document.getElementById('player-list').innerText = players.join(', ');
            db.ref('scores').on('value', sSnap => renderGlobalTable(sSnap.val() || {}, players));
        });

        // --- CHAT LOGIC ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            db.ref('chat').push({ name: myName, text: input.value, time: Date.now() });
            input.value = "";
        }

        db.ref('chat').limitToLast(20).on('child_added', snap => {
            const m = snap.val();
            const div = document.getElementById('chat-messages');
            div.innerHTML += `<div class="msg"><b>${m.name}:</b> ${m.text}</div>`;
            div.scrollTop = div.scrollHeight;
        });

        // --- KNIFFEL FEUERWERK ---
        // Wir überwachen die Scores. Wenn ein neuer 50er Score (Kniffel) auftaucht, böllert es!
        db.ref('scores').on('child_changed', snap => {
            const playerScores = snap.val();
            if (playerScores.kn === 50) {
                celebrate(snap.key);
            }
        });

        function celebrate(winner) {
            const duration = 3 * 1000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#27ae60', '#f1c40f'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#27ae60', '#f1c40f'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // --- CORE FUNCTIONS ---
        function updateUI() {
            const isMe = (gameState.activePlayer === "" || gameState.activePlayer === myName);
            document.getElementById('status-text').innerText = isMe ? "DU BIST DRAN" : gameState.activePlayer.toUpperCase() + " DRAN";
            document.getElementById('roll-btn').disabled = !isMe || gameState.rollsLeft <= 0;
            document.getElementById('roll-btn').innerText = `WÜRFELN (${gameState.rollsLeft})`;
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`die-${i}`);
                el.innerText = gameState.dice[i];
                el.className = gameState.keeps[i] ? "die keep" : "die";
            }
        }

        function renderGlobalTable(allScores, players) {
            const pNames = [...new Set([...players, ...Object.keys(allScores)])].sort();

            // Header
            const head = document.querySelector('#score-head tr');
            head.innerHTML = '<th>Kategorie</th>';
            pNames.forEach(p => head.innerHTML += `<th style="${p === myName ? 'background:var(--primary)' : ''}">${p}</th>`);

            // Body
            const body = document.getElementById('score-body');
            body.innerHTML = '';

            categories.forEach(cat => {
                let row = `<tr><td class="cat-name">${cat.n}</td>`;

                pNames.forEach(p => {
                    let displayVal = "-";
                    let style = "";
                    let action = "";

                    if (cat.id === 'bonus') {
                        // BONUS LOGIK: Summe 1-6 prüfen
                        const upperSum = ['1', '2', '3', '4', '5', '6'].reduce((sum, id) => {
                            return sum + (allScores[p] && allScores[p][id] ? allScores[p][id] : 0);
                        }, 0);
                        displayVal = upperSum >= 63 ? 35 : `(${upperSum}/63)`;
                        style = upperSum >= 63 ? "background:#f1c40f; font-weight:bold; color:black;" : "background:#eee; color:#888; font-size:0.8rem;";
                    } else {
                        const val = (allScores[p] && allScores[p][cat.id] !== undefined) ? allScores[p][cat.id] : "-";
                        displayVal = val;
                        const isMe = (p === myName);
                        if (isMe && val === "-") {
                            action = `onclick="claimScore('${cat.id}')" style="cursor:pointer; background:#fff"`;
                        }
                        if (val !== "-") style = "background:#d1f2eb; font-weight:bold";
                    }

                    row += `<td ${action} style="${style}">${displayVal}</td>`;
                });
                body.innerHTML += row + `</tr>`;
            });

            // Footer (Gesamt inklusive Bonus)
            const foot = document.querySelector('#score-foot tr');
            foot.innerHTML = '<td class="cat-name">GESAMT</td>';
            pNames.forEach(p => {
                const pScore = allScores[p] || {};
                // Normale Punkte
                let total = Object.values(pScore).reduce((a, b) => a + b, 0);
                // Bonus hinzufügen, falls erreicht
                const upperSum = ['1', '2', '3', '4', '5', '6'].reduce((sum, id) => sum + (pScore[id] || 0), 0);
                if (upperSum >= 63) total += 35;

                foot.innerHTML += `<td style="background:#2c3e50; color:white;">${total}</td>`;
            });

            const pNames2 = [...new Set([...players, ...Object.keys(allScores)])].sort();
            checkGameEnd(allScores, pNames2);
        }

        function sendRoll() {
            if (gameState.rollsLeft <= 0) {
                alert("Keine Würfe mehr übrig! Wähle ein Feld in der Tabelle.");
                return;
            }

            const newDice = [...gameState.dice];
            for (let i = 0; i < 5; i++) {
                if (!gameState.keeps[i]) {
                    newDice[i] = Math.floor(Math.random() * 6) + 1;
                }
            }

            db.ref('game').update({
                activePlayer: myName,
                dice: newDice,
                rollsLeft: gameState.rollsLeft - 1
            });
        }

        function toggleKeep(i) {
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            const nk = [...gameState.keeps]; nk[i] = !nk[i];
            db.ref('game').update({ keeps: nk, activePlayer: myName });
        }

        function claimScore(catId) {
            // Statische Felder wie Bonus kann man nicht anklicken
            if (categories.find(c => c.id === catId)?.isStatic) return;

            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) {
                alert("Warte, bis du am Zug bist!");
                return;
            }
            if (gameState.rollsLeft === 3) {
                alert("Du musst erst mindestens einmal würfeln!");
                return;
            }

            let p = calculatePoints(catId);

            // In Firebase speichern
            db.ref('scores/' + myName + '/' + catId).set(p).then(() => {
                // Nach dem Eintragen: Spielstatus für alle zurücksetzen -> Nächster ist dran
                db.ref('game').set({
                    activePlayer: "",
                    dice: [1, 1, 1, 1, 1],
                    keeps: [false, false, false, false, false],
                    rollsLeft: 3
                });
            });
        }

        function calculatePoints(id) {
            const d = [...gameState.dice].sort();
            const sum = d.reduce((a, b) => a + b, 0);
            const counts = {}; d.forEach(x => counts[x] = (counts[x] || 0) + 1);
            const v = Object.values(counts);
            if (!isNaN(id)) return d.filter(x => x == id).length * parseInt(id);
            if (id === 'kn') return v.includes(5) ? 50 : 0;
            if (id === 'ch') return sum;
            if (id === 'fh') return (v.includes(3) && v.includes(2)) ? 25 : 0;
            const u = [...new Set(d)].join('');
            if (id === 'ks') return /1234|2345|3456/.test(u) ? 30 : 0;
            if (id === 'gs') return /12345|23456/.test(u) ? 40 : 0;
            return 0;
        }

        function endTurn() { db.ref('game').set({ activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 }); }
        function fullGameReset() { if (confirm("Alles löschen?")) { db.ref('scores').remove(); db.ref('chat').remove(); endTurn(); } }
        function changeName() { localStorage.removeItem('kniffel_name'); location.reload(); }
        function updatePresence() { const r = db.ref('presence/' + myName); r.set(true); r.onDisconnect().remove(); }

        function checkGameEnd(allScores, pNames) {
            if (pNames.length === 0) return;

            // Nur die klickbaren Kategorien zählen (11 Stück)
            const playableCats = categories.filter(c => !c.isStatic).map(c => c.id);

            // Prüfen, ob JEDER Spieler JEDES Feld voll hat
            const isFinished = pNames.every(p => {
                const pScore = allScores[p] || {};
                return playableCats.every(catId => pScore[catId] !== undefined);
            });

            if (isFinished) {
                // Gewinner ermitteln
                let winnerName = "";
                let maxScore = -1;
                let summary = "";

                pNames.forEach(p => {
                    const pScore = allScores[p] || {};
                    let total = Object.values(pScore).reduce((a, b) => a + b, 0);
                    // Bonus dazurechnen
                    const upperSum = ['1', '2', '3', '4', '5', '6'].reduce((sum, id) => sum + (pScore[id] || 0), 0);
                    if (upperSum >= 63) total += 35;

                    if (total > maxScore) {
                        maxScore = total;
                        winnerName = p;
                    }
                    summary += `<li>${p}: ${total} Punkte</li>`;
                });

                // Feuerwerk starten!
                celebrate();

                // Sieg-Overlay anzeigen (falls noch nicht da)
                if (!document.getElementById('victory-overlay')) {
                    const overlay = document.createElement('div');
                    overlay.id = 'victory-overlay';
                    overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:white; font-family:sans-serif;";
                    overlay.innerHTML = `
                <h1 style="font-size:4rem; color:#f1c40f; margin:0;">🏆 SIEG! 🏆</h1>
                <h2 style="font-size:2rem; margin:20px 0;">${winnerName} gewinnt mit ${maxScore} Punkten!</h2>
                <ul style="list-style:none; padding:0; font-size:1.2rem; color:#aaa;">${summary}</ul>
                <button onclick="fullGameReset()" style="margin-top:30px; padding:15px 30px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">NEUES SPIEL STARTEN</button>
            `;
                    document.body.appendChild(overlay);
                }
            } else {
                // Falls das Spiel noch läuft, aber das Overlay da ist (nach Reset), entfernen
                const oldOverlay = document.getElementById('victory-overlay');
                if (oldOverlay) oldOverlay.remove();
            }
        }

        updatePresence();
    </script>
</body>

</html>
