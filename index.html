<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Kniffel Online Echtzeit</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .dice-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px;
        }

        .die {
            width: 60px;
            height: 60px;
            background: white;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 4px solid transparent;
        }

        .keep {
            background: #f1c40f !important;
            border-color: #d4ac0d;
            transform: translateY(-5px);
        }

        #status-info {
            background: #34495e;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            min-width: 200px;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: #27ae60;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .online-tag {
            color: #2ecc71;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>Kniffel Online 🎲</h1>

    <div id="status-info">
        <span id="status-text">Verbindung wird hergestellt...</span>
        <span id="online-status" class="online-tag"></span>
    </div>

    <div id="lobby">
        <b>Online:</b> <span id="player-list">Warten...</span>
    </div>

    <div class="main-layout" style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
        <div id="game-controls">
            <div class="dice-area" id="dice-container"></div>
            <button id="roll-btn" onclick="sendRoll()">WÜRFELN (3)</button><br>
            <button id="end-turn-btn" onclick="endTurn()" style="background: #e67e22; margin-top:10px;" disabled>ZUG
                BEENDEN</button>
        </div>

        <table id="score-table" style="background: white; color: black; border-collapse: collapse; min-width: 250px;">
            <thead>
                <tr style="background: #2c3e50; color: white;">
                    <th>Kategorie</th>
                    <th id="score-player-name">Deine Punkte</th>
                </tr>
            </thead>
            <tbody id="score-body">
            </tbody>
            <tfoot>
                <tr style="font-weight: bold; background: #eee;">
                    <td>GESAMT</td>
                    <td id="total-score">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="dice-area" id="dice-container">
        <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
        <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
        <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
        <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
        <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
    </div>

    <button id="end-turn-btn" onclick="endTurn()" style="background: #e67e22; margin-top: 10px;" disabled>
        ZUG BEENDEN
    </button>

    <br><br>
    <button onclick="resetGame()" style="background: #c0392b; font-size: 12px; padding: 5px 15px;">
        Spiel komplett zurücksetzen
    </button>

    <button id="roll-btn" onclick="sendRoll()" disabled>WÜRFELN</button>
    <p>Angemeldet als: <b id="my-display-name">...</b></p>
    <button onclick="changeName()" style="background: #3498db; font-size: 12px; padding: 5px 15px;">
        Name ändern
    </button>

    <script>
        // --- DEINE FIREBASE KONFIGURATION HIER EINSETZEN ---
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041",
            measurementId: "G-3N5Q2QB2DQ"
        };
        // --------------------------------------------------

        // Firebase Initialisieren
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Spieler-Name
        let myName = localStorage.getItem('kniffel_name') || prompt("Dein Name für dieses Spiel:") || "Gast";
        localStorage.setItem('kniffel_name', myName);
        document.getElementById('my-display-name').innerText = myName;

        // Lokaler Spielzustand (Standardwerte)
        let gameState = {
            activePlayer: "",
            dice: [1, 1, 1, 1, 1],
            keeps: [false, false, false, false, false],
            rollsLeft: 3
        };

        // Verbindung prüfen
        db.ref('.info/connected').on('value', (snap) => {
            const statusTag = document.getElementById('online-status');
            statusTag.innerText = snap.val() ? "● Server verbunden" : "○ Verbindung unterbrochen";
        });

        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();

            // DEBUG: Schau in die Browser-Konsole (F12), was hier ankommt
            console.log("Daten von Firebase erhalten:", data);

            if (!data) {
                console.log("Datenbank ist leer, initialisiere...");
                const initialStore = {
                    activePlayer: myName, // Der erste, der connectet, ist dran
                    dice: [1, 2, 3, 4, 5],
                    keeps: [false, false, false, false, false],
                    rollsLeft: 3
                };
                db.ref('game').set(initialStore);
                return;
            }

            gameState = data;

            // UI-Elemente direkt hier freischalten, falls sie hängen
            document.getElementById('status-text').innerText = "Spiel bereit!";
            document.getElementById('roll-btn').disabled = (gameState.activePlayer !== "" && gameState.activePlayer !== myName);

            updateUI();
        }, (error) => {
            // Falls Firebase den Zugriff verweigert, sehen wir es jetzt!
            console.error("Firebase Fehler:", error);
            document.getElementById('status-text').innerText = "Zugriff verweigert (Rules?)";
        });

        // UI-Update erweitern
        function updateUI() {
            if (!gameState || !gameState.dice) return;

            const infoText = document.getElementById('status-text');
            const rollBtn = document.getElementById('roll-btn');
            const endBtn = document.getElementById('end-turn-btn');

            // Würfel & Keeps anzeigen
            for (let i = 0; i < 5; i++) {
                const dieEl = document.getElementById(`die-${i}`);
                dieEl.innerText = gameState.dice[i];
                dieEl.className = gameState.keeps[i] ? "die keep" : "die";
            }

            // Wer darf was klicken?
            if (gameState.activePlayer === "" || gameState.activePlayer === myName) {
                infoText.innerText = "Du bist am Zug!";
                rollBtn.disabled = (gameState.rollsLeft <= 0);
                endBtn.disabled = (gameState.rollsLeft === 3); // Erst beenden, wenn mind. 1x gewürfelt
            } else {
                infoText.innerText = gameState.activePlayer + " ist gerade dran...";
                rollBtn.disabled = true;
                endBtn.disabled = true;
            }
        }

        // Würfeln und sofort in DB speichern
        function sendRoll() {
            if (gameState.rollsLeft <= 0) return;

            const newDice = [...gameState.dice];
            for (let i = 0; i < 5; i++) {
                if (!gameState.keeps[i]) {
                    newDice[i] = Math.floor(Math.random() * 6) + 1;
                }
            }

            // Update in Firebase: Alle sehen die neuen Würfel sofort
            db.ref('game').update({
                activePlayer: myName,
                dice: newDice,
                rollsLeft: gameState.rollsLeft - 1
            });
        }

        // Würfel fixieren und sofort in DB speichern
        function toggleKeep(i) {
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            if (gameState.rollsLeft === 3) return; // Noch nicht gewürfelt

            const newKeeps = [...gameState.keeps];
            newKeeps[i] = !newKeeps[i];

            // Update in Firebase: Dein Partner sieht sofort, welche Würfel du hältst
            db.ref('game').update({
                keeps: newKeeps,
                activePlayer: myName
            });
        }
        function resetGame() {
            if (confirm("Willst du das Spiel für ALLE wirklich zurücksetzen?")) {
                db.ref('game').set({
                    activePlayer: myName, // Du wirst der aktive Spieler
                    dice: [1, 1, 1, 1, 1],
                    keeps: [false, false, false, false, false],
                    rollsLeft: 3
                }).then(() => {
                    alert("Spiel wurde zurückgesetzt!");
                    location.reload(); // Seite neu laden, um alles frisch zu ziehen
                });
            }
        }

        function changeName() {
            localStorage.removeItem('kniffel_name'); // Löscht den gespeicherten Namen
            location.reload(); // Lädt die Seite neu, damit die Abfrage wieder kommt
        }

        // Zug beenden: Macht den Weg frei für den nächsten
        function endTurn() {
            if (gameState.activePlayer !== myName) return;

            // Wir setzen die Würfel und Keeps zurück und löschen den aktiven Spieler
            db.ref('game').set({
                activePlayer: "", // Jetzt darf der Nächste würfeln
                dice: [1, 1, 1, 1, 1],
                keeps: [false, false, false, false, false],
                rollsLeft: 3
            }).then(() => {
                alert("Dein Zug ist beendet. Der Nächste ist dran!");
            });
        }

        // Kategorien definieren
        const categories = [
            { id: '1', n: '1er' }, { id: '2', n: '2er' }, { id: '3', n: '3er' },
            { id: '4', n: '4er' }, { id: '5', n: '5er' }, { id: '6', n: '6er' },
            { id: 'kn', n: 'Kniffel (50)' }, { id: 'ch', n: 'Chance' }
        ];

        // 1. ANWESENHEIT: Zeige dich als online
        function updatePresence() {
            const userRef = db.ref('presence/' + myName);
            userRef.set(true);
            userRef.onDisconnect().remove(); // Löscht dich, wenn du den Tab schließt
        }

        // 2. LOBBY: Liste alle Spieler auf
        db.ref('presence').on('value', (snap) => {
            const players = snap.val() ? Object.keys(snap.val()) : [];
            document.getElementById('player-list').innerText = players.join(', ');
        });

        // 3. TABELLE INITIALISIEREN
        function initScoreTable() {
            const body = document.getElementById('score-body');
            body.innerHTML = categories.map(cat => `
        <tr>
            <td>${cat.n}</td>
            <td id="score-${cat.id}" onclick="claimScore('${cat.id}')" style="cursor:pointer; background:#f9f9f9; width:80px;">-</td>
        </tr>
    `).join('');
            loadMyScores();
        }

        // 4. PUNKTE EINTRAGEN (Lokal & DB)
        function claimScore(catId) {
            if (gameState.activePlayer !== myName) {
                alert("Du kannst nur Punkte eintragen, wenn du am Zug bist!");
                return;
            }
            if (gameState.rollsLeft === 3) return; // Noch nicht gewürfelt

            let points = calculatePoints(catId);

            // In Firebase unter deinem Namen speichern
            db.ref('scores/' + myName + '/' + catId).set(points).then(() => {
                endTurn(); // Zug endet automatisch nach Eintragung
            });
        }

        // 5. PUNKTE BERECHNEN (vereinfacht)
        function calculatePoints(id) {
            if (id === 'ch') return gameState.dice.reduce((a, b) => a + b, 0);
            if (id === 'kn') {
                const first = gameState.dice[0];
                return gameState.dice.every(d => d === first) ? 50 : 0;
            }
            const val = parseInt(id);
            return gameState.dice.filter(d => d === val).length * val;
        }

        // 6. MEINE PUNKTE LADEN & ANZEIGEN
        function loadMyScores() {
            db.ref('scores/' + myName).on('value', (snap) => {
                const myScores = snap.val() || {};
                let total = 0;
                categories.forEach(cat => {
                    const val = myScores[cat.id];
                    const cell = document.getElementById(`score-${cat.id}`);
                    if (val !== undefined) {
                        cell.innerText = val;
                        cell.style.background = "#d1f2eb";
                        cell.onclick = null; // Feld gesperrt
                        total += val;
                    }
                });
                document.getElementById('total-score').innerText = total;
            });
        }

        // Ruf diese Funktionen beim Start auf
        updatePresence();
        initScoreTable();
    </script>
</body>

</html>
