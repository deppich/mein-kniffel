<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kniffel Online - Room Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #27ae60;
            --secondary: #e67e22;
            --accent: #3498db;
            --danger: #e74c3c;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        #status-info {
            background: #2c3e50;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px;
            border: 1px solid #3e5871;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .game-card,
        .score-card,
        .chat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-card {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
        }

        .score-card {
            flex: 1.5;
            min-width: 350px;
        }

        .chat-card {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .dice-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .die {
            width: 55px;
            height: 55px;
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid transparent;
        }

        .keep {
            background: var(--gold) !important;
            transform: translateY(-5px);
            border-color: #d4ac0d;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: #333;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
            font-size: 0.85rem;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
        }

        .cat-name {
            text-align: left;
            font-weight: bold;
            background: #f8f9fa;
            width: 140px;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-align: left;
        }

        .msg {
            margin-bottom: 5px;
            color: #ccc;
        }

        .msg b {
            color: var(--accent);
        }

        #chat-input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: calc(100% - 24px);
            background: #333;
            color: white;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 8px;
        }

        #roll-btn {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
        }

        #roll-btn:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }

        .danger-btn {
            background: var(--danger);
            color: white;
            width: auto;
            padding: 10px 20px;
            margin-top: 30px;
        }

        /* Sieg Overlay */
        #victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

    <div class="header-section">
        <h1>KNIFFEL <span id="room-display" style="color:var(--accent)">...</span></h1>
        <div id="status-info">
            <span id="status-text">Lade Spiel...</span>
        </div>
        <p style="font-size: 0.8rem; color: #888;">Im Raum: <span id="player-list" style="color:var(--accent)">-</span>
        </p>
    </div>

    <div class="main-container">
        <div id="lobby-section"
            style="background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 2px solid var(--accent);">
            <h3>Wartezimmer</h3>
            <p id="lobby-status">Warte auf Mitspieler...</p>
            <div id="lobby-players" style="margin: 10px 0; color: var(--gold);"></div>
            <button id="start-game-btn" onclick="startGame()" style="background: var(--primary); display: none;">SPIEL
                JETZT STARTEN</button>
        </div>
        <div class="game-card">
            <div style="font-size: 0.9rem; margin-bottom: 15px;">Spieler: <b id="my-display-name">...</b></div>
            <div class="dice-area">
                <div class="die" id="die-0" onclick="toggleKeep(0)">?</div>
                <div class="die" id="die-1" onclick="toggleKeep(1)">?</div>
                <div class="die" id="die-2" onclick="toggleKeep(2)">?</div>
                <div class="die" id="die-3" onclick="toggleKeep(3)">?</div>
                <div class="die" id="die-4" onclick="toggleKeep(4)">?</div>
            </div>
            <button id="roll-btn" onclick="sendRoll()">WÜRFELN (3)</button>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="changeName()" style="background:#555; color:white; font-size:0.7rem;">Name
                    ändern</button>
                <button onclick="location.hash=''; location.reload();"
                    style="background:var(--secondary); color:white; font-size:0.7rem;">Raum wechseln</button>
            </div>
        </div>

        <div class="score-card">
            <table id="multi-score-table">
                <thead id="score-head">
                    <tr>
                        <th>Kategorie</th>
                    </tr>
                </thead>
                <tbody id="score-body"></tbody>
                <tfoot id="score-foot">
                    <tr style="font-weight: bold;">
                        <td class="cat-name">GESAMT</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="chat-card">
            <h3 style="margin:0 0 10px 0; font-size: 1rem; color: var(--accent);">Raum-Chat</h3>
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Nachricht..."
                onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <div style="text-align: center;">
        <button class="danger-btn" onclick="fullGameReset()">DIESEN RAUM ZURÜCKSETZEN</button>
    </div>

    <script>
        // --- KONFIGURATION & RÄUME ---
        const firebaseConfig = {
            apiKey: "AIzaSyCn_L6O2TyeZ3Ww_K1OwE6l8L8wWY90OmQ",
            authDomain: "kniffelonline.firebaseapp.com",
            databaseURL: "https://kniffelonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kniffelonline",
            storageBucket: "kniffelonline.firebasestorage.app",
            messagingSenderId: "1019396534228",
            appId: "1:1019396534228:web:a0308e51d231cc03c53041"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomId = window.location.hash.substring(1) || prompt("Raum Name?", "Lobby") || "Lobby";
        window.location.hash = roomId;
        document.getElementById('room-display').innerText = "#" + roomId;

        let myName = localStorage.getItem('kniffel_name') || prompt("Dein Name:") || "Gast";
        localStorage.setItem('kniffel_name', myName);
        document.getElementById('my-display-name').innerText = myName;

        let gameState = { activePlayer: "", dice: [1, 1, 1, 1, 1], keeps: [false, false, false, false, false], rollsLeft: 3 };
        const categories = [
            { id: '1', n: '1er' }, { id: '2', n: '2er' }, { id: '3', n: '3er' },
            { id: '4', n: '4er' }, { id: '5', n: '5er' }, { id: '6', n: '6er' },
            { id: 'bonus', n: 'BONUS (ab 63)', isStatic: true },
            { id: 'fh', n: 'Full House' }, { id: 'ks', n: 'Kl. Straße' },
            { id: 'gs', n: 'Gr. Straße' }, { id: 'kn', n: 'KNIFFEL' }, { id: 'ch', n: 'Chance' }
        ];

        // --- DATABASE REFS (Room-Scoped) ---
        const roomRef = db.ref('rooms/' + roomId);
        const gameRef = roomRef.child('game');
        const scoreRef = roomRef.child('scores');
        const chatRef = roomRef.child('chat');
        const presenceRef = roomRef.child('presence');

        // --- GAME LOGIC ---
        gameRef.on('value', snap => {
            const data = snap.val();
            if (!data) {
                gameRef.set({ activePlayer: "", dice: [1, 2, 3, 4, 5], keeps: [false, false, false, false, false], rollsLeft: 3 });
                return;
            }
            gameState = data;
            updateUI();
        });

        function getNextPlayer(currentName, allPlayers) {
            const sorted = allPlayers.sort();
            const currentIndex = sorted.indexOf(currentName);
            const nextIndex = (currentIndex + 1) % sorted.length;
            return sorted[nextIndex];
        }

        // Variable, um den Host zu identifizieren (der alphabetisch erste in der Liste)
        let isHost = false;

        function updateUI() {
            presenceRef.on('value', snap => {
                const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];
                isHost = (players[0] === myName);

                // Check: Läuft das Spiel schon?
                roomRef.child('gameStarted').on('value', startSnap => {
                    const hasStarted = startSnap.val();
                    const lobby = document.getElementById('lobby-section');
                    const gameCard = document.querySelector('.game-card');
                    const scoreCard = document.querySelector('.score-card');

                    if (!hasStarted) {
                        // LOBBY MODUS
                        lobby.style.display = "block";
                        gameCard.style.opacity = "0.3";
                        gameCard.style.pointerEvents = "none";
                        scoreCard.style.opacity = "0.3";

                        document.getElementById('lobby-players').innerText = "Bereit: " + players.join(", ");

                        // Nur der Host sieht den Start-Button
                        const startBtn = document.getElementById('start-game-btn');
                        if (isHost) {
                            startBtn.style.display = "block";
                            document.getElementById('lobby-status').innerText = "Du bist der Host. Warte auf alle Spieler...";
                        } else {
                            startBtn.style.display = "none";
                            document.getElementById('lobby-status').innerText = "Warte darauf, dass " + players[0] + " das Spiel startet...";
                        }
                    } else {
                        // SPIEL MODUS
                        lobby.style.display = "none";
                        gameCard.style.opacity = "1";
                        gameCard.style.pointerEvents = "auto";
                        scoreCard.style.opacity = "1";

                        // Hier kommt deine bestehende Zug-Logik rein
                        const currentPlayer = gameState.activePlayer || players[0];
                        const isMyTurn = (currentPlayer === myName);
                        document.getElementById('status-text').innerText = isMyTurn ? "DU BIST DRAN!" : currentPlayer + " IST DRAN";

                        const rb = document.getElementById('roll-btn');
                        rb.disabled = !isMyTurn || gameState.rollsLeft <= 0;
                    }
                });
            });

            // Würfel-Anzeige (wie bisher)
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById(`die-${i}`);
                if (el) {
                    el.innerText = gameState.dice[i];
                    el.className = gameState.keeps[i] ? "die keep" : "die";
                }
            }
        }

        function startGame() {
            if (!isHost) return;

            presenceRef.once('value', snap => {
                const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];

                // 1. Spiel als gestartet markieren
                roomRef.child('gameStarted').set(true);

                // 2. Den ersten Spieler (Host) als aktiv setzen
                gameRef.update({
                    activePlayer: players[0],
                    rollsLeft: 3,
                    dice: [1, 2, 3, 4, 5]
                });

                // 3. Chat-Nachricht senden
                chatRef.push({ name: "SYSTEM", text: "Das Spiel wurde gestartet! " + players[0] + " beginnt." });
            });
        }

        function sendRoll() {
            const newDice = [...gameState.dice];
            for (let i = 0; i < 5; i++) if (!gameState.keeps[i]) newDice[i] = Math.floor(Math.random() * 6) + 1;
            gameRef.update({ activePlayer: myName, dice: newDice, rollsLeft: gameState.rollsLeft - 1 });
        }

        function toggleKeep(i) {
            if (gameState.activePlayer !== "" && gameState.activePlayer !== myName) return;
            const nk = [...gameState.keeps]; nk[i] = !nk[i];
            gameRef.update({ keeps: nk, activePlayer: myName });
        }

        function claimScore(id) {
            // Statische Felder ignorieren
            if (categories.find(c => c.id === id)?.isStatic) return;

            // PRÜFUNG: Bin ich wirklich dran?
            presenceRef.once('value', snap => {
                const players = snap.val() ? Object.keys(snap.val()).sort() : [myName];
                const currentPlayer = gameState.activePlayer || players[0];

                if (currentPlayer !== myName) {
                    alert("Halt! Du bist noch nicht an der Reihe.");
                    return;
                }

                if (gameState.rollsLeft === 3) {
                    alert("Du musst mindestens einmal würfeln!");
                    return;
                }

                const val = calculatePoints(id);

                // Punkt speichern
                scoreRef.child(myName).child(id).set(val).then(() => {
                    // Nächsten Spieler ermitteln
                    const nextPlayer = getNextPlayer(myName, players);

                    // Spielstatus für den NÄCHSTEN setzen
                    gameRef.set({
                        activePlayer: nextPlayer,
                        dice: [1, 1, 1, 1, 1],
                        keeps: [false, false, false, false, false],
                        rollsLeft: 3
                    });
                });
            });
        }

        // --- SCORES & TABLE ---
        presenceRef.on('value', pSnap => {
            const players = pSnap.val() ? Object.keys(pSnap.val()) : [myName];
            document.getElementById('player-list').innerText = players.join(', ');
            scoreRef.on('value', sSnap => renderGlobalTable(sSnap.val() || {}, players));
        });

        function renderGlobalTable(allScores, players) {
            const pNames = [...new Set([...players, ...Object.keys(allScores)])].sort();
            const head = document.querySelector('#score-head tr');
            head.innerHTML = '<th>Kategorie</th>';
            pNames.forEach(p => head.innerHTML += `<th style="${p === myName ? 'background:var(--primary)' : ''}">${p}</th>`);

            const body = document.getElementById('score-body');
            body.innerHTML = '';
            categories.forEach(cat => {
                let row = `<tr><td class="cat-name">${cat.n}</td>`;
                pNames.forEach(p => {
                    let val = "-"; let style = ""; let action = "";
                    if (cat.id === 'bonus') {
                        const sum = ['1', '2', '3', '4', '5', '6'].reduce((s, i) => s + (allScores[p]?.[i] || 0), 0);
                        val = sum >= 63 ? 35 : `(${sum}/63)`;
                        style = sum >= 63 ? "background:#f1c40f; font-weight:bold;" : "background:#eee; color:#999; font-size:0.7rem;";
                    } else {
                        const s = allScores[p]?.[cat.id];
                        val = (s !== undefined) ? s : "-";
                        if (p === myName && val === "-") action = `onclick="claimScore('${cat.id}')" style="cursor:pointer; background:#fff"`;
                        if (val !== "-") style = "background:#d1f2eb; font-weight:bold";
                    }
                    row += `<td ${action} style="${style}">${val}</td>`;
                });
                body.innerHTML += row + `</tr>`;
            });

            const foot = document.querySelector('#score-foot tr');
            foot.innerHTML = '<td class="cat-name">GESAMT</td>';
            pNames.forEach(p => {
                let total = Object.values(allScores[p] || {}).reduce((a, b) => a + b, 0);
                const sum6 = ['1', '2', '3', '4', '5', '6'].reduce((s, i) => s + (allScores[p]?.[i] || 0), 0);
                if (sum6 >= 63) total += 35;
                foot.innerHTML += `<td style="background:#2c3e50; color:white;">${total}</td>`;
            });
            checkGameEnd(allScores, pNames);
        }

        // --- ENDGAME & FIREWORKS ---
        function checkGameEnd(allScores, pNames) {
            const playableCats = categories.filter(c => !c.isStatic).map(c => c.id);
            const isFinished = pNames.length > 0 && pNames.every(p => playableCats.every(catId => allScores[p]?.[catId] !== undefined));

            const existing = document.getElementById('victory-overlay');
            if (isFinished) {
                if (existing) return;
                let winN = ""; let maxS = -1; let list = "";
                pNames.forEach(p => {
                    let t = Object.values(allScores[p] || {}).reduce((a, b) => a + b, 0);
                    if (['1', '2', '3', '4', '5', '6'].reduce((s, i) => s + (allScores[p]?.[i] || 0), 0) >= 63) t += 35;
                    if (t > maxS) { maxS = t; winN = p; }
                    list += `<li>${p}: ${t} Pkt.</li>`;
                });
                const div = document.createElement('div');
                div.id = 'victory-overlay';
                div.innerHTML = `<h1>🏆 ${winN} GEWINNT! 🏆</h1><h2 style="color:var(--gold)">${maxS} Punkte</h2><ul style="list-style:none;padding:0">${list}</ul><button onclick="fullGameReset()" style="width:200px; background:var(--primary); color:white;">NEUSTART</button>`;
                document.body.appendChild(div);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else if (existing) { existing.remove(); }
        }

        // --- CHAT & HELPERS ---
        function sendMessage() {
            const i = document.getElementById('chat-input');
            if (!i.value) return;
            chatRef.push({ name: myName, text: i.value });
            i.value = "";
        }
        chatRef.limitToLast(15).on('child_added', snap => {
            const m = snap.val();
            const d = document.getElementById('chat-messages');
            d.innerHTML += `<div class="msg"><b>${m.name}:</b> ${m.text}</div>`;
            d.scrollTop = d.scrollHeight;
        });

        function calculatePoints(id) {
            const d = [...gameState.dice].sort();
            const sum = d.reduce((a, b) => a + b, 0);
            const counts = {}; d.forEach(x => counts[x] = (counts[x] || 0) + 1);
            const v = Object.values(counts);
            if (!isNaN(id)) return d.filter(x => x == id).length * parseInt(id);
            if (id === 'kn') return v.includes(5) ? 50 : 0;
            if (id === 'ch') return sum;
            if (id === 'fh') return (v.includes(3) && v.includes(2)) ? 25 : 0;
            const u = [...new Set(d)].join('');
            if (id === 'ks') return /1234|2345|3456/.test(u) ? 30 : 0;
            if (id === 'gs') return /12345|23456/.test(u) ? 40 : 0;
            return 0;
        }

        function fullGameReset() {
            if (confirm("Raum wirklich komplett zurücksetzen?")) {
                roomRef.remove(); // Löscht game, scores, chat UND gameStarted
                location.reload(); // Seite neu laden, um sauber in der Lobby zu starten
            }
        }
        function changeName() { localStorage.removeItem('kniffel_name'); location.reload(); }
        const r = presenceRef.child(myName); r.set(true); r.onDisconnect().remove();
    </script>
</body>

</html>
